services:
  app:
    container_name: avangard
    build: .
    image: "avangard:latest"
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - DB_NAME=chat_db
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_PUBLIC_URL=http://localhost:8080
      - KEYCLOAK_REALM=avangard
      - KEYCLOAK_CLIENT_ID=avangard.chat.org
    depends_on:
      - mongodb
      - keycloak
    restart: unless-stopped


  mongodb:
    container_name: mongo
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      - KC_HOSTNAME_URL=http://localhost:8080
      - KC_PROXY=edge
      - KC_HTTP_ENABLED=true
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres-db:5432/keycloak
      - KC_DB_USERNAME=keycloak_user
      - KC_DB_PASSWORD=keycloak_password

    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./realm-config.json:/opt/keycloak/data/import/realm-config.json

  postgres-db:
    image: postgres:14.2
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres_user
      - POSTGRES_PASSWORD=postgres_pass
      - PGUSER=postgres_user
    healthcheck:
      test: [
        "CMD",
        "pg_isready",
        "-d",
        "adept",
        "-U",
        "postgres_user",
      ]
      interval: 5s
      timeout: 10s
      retries: 120
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-keycloak-db.sql:/docker-entrypoint-initdb.d/init-keycloak-db.sql


volumes:
  postgres_data:
  mongo_data: