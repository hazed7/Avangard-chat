services:
  app:
    container_name: avangard
    build: .
    image: "avangard:latest"
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - DB_NAME=chat_db
      - DRAGONFLY_URL=redis://dragonfly:6379/0
      - TYPESENSE_URL=http://typesense:8108
      - TYPESENSE_API_KEY=dev-typesense-key
      - LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_API_URL=http://livekit:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - JWT_SECRET_KEY=change-me-access-secret
      - REFRESH_TOKEN_SECRET_KEY=change-me-refresh-secret
      - MESSAGE_CURSOR_SECRET_KEY=change-me-message-cursor-secret
      - MESSAGE_ENCRYPTION_ACTIVE_KEY_ID=v1
      - 'MESSAGE_ENCRYPTION_KEYS={"v1":"MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="}'
    depends_on:
      mongodb:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      livekit:
        condition: service_started
      typesense:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  mongodb:
    container_name: mongo
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://localhost:27017/admin",
          "--eval",
          "quit(db.runCommand({ ping: 1 }).ok ? 0 : 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  dragonfly:
    container_name: dragonfly
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.1
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s
    restart: unless-stopped

  livekit:
    container_name: livekit
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./deploy/livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  typesense:
    container_name: typesense
    image: typesense/typesense:27.1
    command: "--data-dir=/data --api-key=dev-typesense-key --enable-cors"
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  typesense_data:
