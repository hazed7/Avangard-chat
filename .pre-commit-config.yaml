default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --group dev ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: uv run --group dev ruff format
        language: system
        types_or: [python, pyi]
      - id: check-architecture-imports
        name: check architecture import boundaries
        entry: uv run --group dev python scripts/check_architecture_imports.py
        language: system
        pass_filenames: false
        always_run: true
      - id: check-commit-msg
        name: check conventional commit message
        entry: uv run --group dev python scripts/check_commit_msg.py
        language: system
        stages: [commit-msg]
